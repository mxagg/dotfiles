<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotfiles</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 { color: #89b4fa; }
        h2 { color: #89b4fa; cursor: pointer; }
        a {
            color: #a6e3a1;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        ul { list-style: none; padding: 0; }
        li { padding: 4px 0; }
        li.file::before { content: "📄 "; }
        li.dir::before { content: "📁 "; }
        .path { color: #6c7086; font-size: 0.85em; }
        .breadcrumb { color: #6c7086; margin-bottom: 16px; }
        .breadcrumb a { color: #89b4fa; }
        .loading { color: #6c7086; font-style: italic; }
    </style>
</head>
<body>
    <h1>dotfiles</h1>
    <p class="path">A simple index of my dotfiles.</p>
    <div class="breadcrumb" id="breadcrumb"></div>
    <ul id="file-list">
        <li class="loading">Loading...</li>
    </ul>

    <script>
        const REPO = 'mxagg/dotfiles';
        const BRANCH = 'main';

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getPath() {
            return new URLSearchParams(window.location.search).get('path') || '';
        }

        function renderBreadcrumb(path) {
            const bc = document.getElementById('breadcrumb');
            if (!path) { bc.innerHTML = ''; return; }
            const parts = path.split('/');
            let html = '<a href="?">root</a>';
            let accumulated = '';
            for (const part of parts) {
                accumulated += (accumulated ? '/' : '') + part;
                html += ` / <a href="?path=${encodeURIComponent(accumulated)}">${escapeHtml(part)}</a>`;
            }
            bc.innerHTML = html;
        }

        async function loadDir(path) {
            const list = document.getElementById('file-list');
            list.innerHTML = '<li class="loading">Loading...</li>';
            renderBreadcrumb(path);

            const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const items = await res.json();

                const sorted = items
                    .filter(i => i.name !== 'index.html')
                    .sort((a, b) => {
                        if (a.type === b.type) return a.name.localeCompare(b.name);
                        return a.type === 'dir' ? -1 : 1;
                    });

                list.innerHTML = '';
                for (const item of sorted) {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    if (item.type === 'dir') {
                        li.className = 'dir';
                        a.href = `?path=${encodeURIComponent(item.path)}`;
                        a.textContent = item.name + '/';
                    } else {
                        li.className = 'file';
                        a.href = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${item.path}`;
                        a.textContent = item.name;
                        a.target = '_blank';
                    }
                    li.appendChild(a);
                    list.appendChild(li);
                }

                if (sorted.length === 0) {
                    list.innerHTML = '<li class="loading">Empty directory</li>';
                }
            } catch (e) {
                list.innerHTML = `<li class="loading">Error: ${escapeHtml(e.message)}</li>`;
            }
        }

        loadDir(getPath());
    </script>
</body>
</html>
